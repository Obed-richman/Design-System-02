<!-- ============================================
     TIER CARD SNIPPETS
     Requires: tokens/tokens.css
               components/button/button.css
               components/tier-card/tier-card.css

     Variants:
       .tier-card--tier-1   berry header
       .tier-card--tier-2   brand purple header (default)
       .tier-card--tier-3   blue header
       .tier-card--selected teal top-border, primary CTA

     CTA buttons carry data-tier="n" so the JS selection
     script can update all cards in a group at once.
     ============================================ -->


<!-- =====================
     DEFAULT — 3 tiers, Tier 1 selected
     ===================== -->

<div class="tier-card tier-card--tier-1 tier-card--selected">
  <div class="tier-card__header">
    <span class="tier-card__name">Tier 1</span>
  </div>
  <div class="tier-card__body">
    <div class="tier-card__price">
      <span class="tier-card__amount">£857.43</span>
    </div>
    <button class="btn btn--rounded btn--primary btn--medium tier-card__cta" data-tier="1" type="button">
      Selected
    </button>
  </div>
</div>

<div class="tier-card tier-card--tier-2">
  <div class="tier-card__header">
    <span class="tier-card__name">Tier 2</span>
  </div>
  <div class="tier-card__body">
    <div class="tier-card__price">
      <span class="tier-card__amount">£1,232.00</span>
    </div>
    <button class="btn btn--rounded btn--secondary btn--medium tier-card__cta" data-tier="2" type="button">
      Select Tier 2
    </button>
  </div>
</div>

<div class="tier-card tier-card--tier-3">
  <div class="tier-card__header">
    <span class="tier-card__name">Tier 3</span>
  </div>
  <div class="tier-card__body">
    <div class="tier-card__price">
      <span class="tier-card__amount">£1,549.00</span>
    </div>
    <button class="btn btn--rounded btn--secondary btn--medium tier-card__cta" data-tier="3" type="button">
      Select Tier 3
    </button>
  </div>
</div>


<!-- ============================================
     REQUIRED JAVASCRIPT
     Wrap all tier cards for a single product in a
     shared container and pass it to tierCardInit().
     ============================================ -->
<script>
  function tierCardInit(container) {
    container.addEventListener('click', function (e) {
      var cta = e.target.closest('.tier-card__cta');
      if (!cta) return;

      var newTier = parseInt(cta.dataset.tier, 10);
      if (!newTier) return;

      container.querySelectorAll('.tier-card').forEach(function (card) {
        card.classList.remove('tier-card--selected');
      });

      container.querySelectorAll('.tier-card__cta').forEach(function (btn) {
        var t = parseInt(btn.dataset.tier, 10);
        if (t === newTier) {
          btn.textContent = 'Selected';
          btn.classList.remove('btn--secondary');
          btn.classList.add('btn--primary');
          btn.closest('.tier-card').classList.add('tier-card--selected');
        } else {
          btn.textContent = 'Select Tier ' + t;
          btn.classList.remove('btn--primary');
          btn.classList.add('btn--secondary');
        }
      });
    });
  }
</script>
