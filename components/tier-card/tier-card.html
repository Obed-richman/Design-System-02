<!-- ============================================
     TIER CARD SNIPPETS
     Requires: tokens/tokens.css
               components/button/button.css
               components/tier-card/tier-card.css
     ============================================ -->


<!-- Default -->
<div class="tier-card">
  <div class="tier-card__header">
    <span class="tier-card__name">Tier 1</span>
  </div>
  <div class="tier-card__body">
    <div class="tier-card__price">
      <span class="tier-card__amount">£857.43</span>
    </div>
    <button class="btn btn--rounded btn--secondary btn--medium tier-card__cta" type="button">
      Select Tier 1
    </button>
  </div>
</div>


<!-- Selected — teal top-border accent, primary CTA -->
<div class="tier-card tier-card--selected">
  <div class="tier-card__header">
    <span class="tier-card__name">Tier 2</span>
  </div>
  <div class="tier-card__body">
    <div class="tier-card__price">
      <span class="tier-card__amount">£1,232.00</span>
    </div>
    <button class="btn btn--rounded btn--primary btn--medium tier-card__cta" type="button">
      Selected
    </button>
  </div>
</div>
