<!-- ============================================
     COMPARISON TILE COMPONENT SNIPPETS
     Copy what you need into a screen or index.html

     Dependencies — link all of these in <head>:
       tokens/tokens.css
       tokens/typography.css
       components/comparison-tile/comparison-tile.css

     NOTE: This component does NOT require
     components/radio/radio.css — the radio
     control is custom-styled within comparison-tile.css.

     Structure:
       <label class="comparison-tile">    ← entire tile is clickable (no JS needed)
         <div class="comparison-tile__header">
           <input type="radio" />          ← hidden, drives all states via CSS
           <span class="...radio-control"> ← custom styled circle
           <span class="...title">         ← title text
         </div>
         <div class="comparison-tile__body">
           <p class="...price">            ← large value + period suffix
           <p class="...sub">              ← sub text
           <p class="...support">          ← support text
         </div>
       </label>

     Size modifier classes on the <label>:
       .comparison-tile--large     desktop padding
       .comparison-tile--small     mobile padding

     States are driven by the radio input attribute:
       (no attribute)   → default (unselected)
       checked          → selected / active
       disabled         → disabled
       :hover on label  → hover (handled by CSS automatically)

     Group tiles with the same name="" so only
     one can be selected at a time.
     ============================================ -->


<!-- ============================================
     LARGE — desktop size
     ============================================ -->

<!-- Large · Default -->
<label class="comparison-tile comparison-tile--large" for="ct-lg-default">

  <div class="comparison-tile__header">
    <input class="comparison-tile__input" type="radio" id="ct-lg-default" name="ct-group-lg">
    <span class="comparison-tile__radio-control"></span>
    <span class="comparison-tile__title text-subtitle-2">Title</span>
  </div>
  <div class="comparison-tile__body">
    <p class="comparison-tile__price text-title-2-bold">
      £XXX <span class="comparison-tile__period text-body-2">/year</span>
    </p>
    <p class="comparison-tile__sub text-subtitle-3">Sub text</p>
    <p class="comparison-tile__support text-body-3">Support text</p>
  </div>
  
</label>


<!-- Large · Hover — hover the element in browser to see state -->

<!-- ============================================
     GROUP EXAMPLE
     Same name="" on all inputs = mutually
     exclusive selection, no JavaScript needed.
     Clicking anywhere on a tile selects it
     because the outer element is a <label>.
     ============================================ -->

<div style="display: flex; gap: 16px;">

  <!-- Third Party — unselected -->
  <label class="comparison-tile comparison-tile--large" for="ct-plan-a">

      <span class="comparison-tile__radio-control"></span>
      <span class="comparison-tile__title text-subtitle-2">Third Party</span>
    </div>
    <div class="comparison-tile__body">
      <p class="comparison-tile__price text-title-2-bold">
        £58 <span class="comparison-tile__period text-body-2">/year</span>
      </p>
      <p class="comparison-tile__sub text-subtitle-3">Billed annually</p>
      <p class="comparison-tile__support text-body-3">Basic cover only</p>
    </div>
  </label>

  <!-- Comprehensive — selected by default -->
