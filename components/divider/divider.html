<!-- ============================================
     DIVIDER COMPONENT SNIPPETS
     Requires: tokens/tokens.css
               components/divider/divider.css
     ============================================ -->


<!-- Simple divider
     A single thin 1px line — use for subtle separation
     between related content blocks within a section. -->
<div class="divider divider--simple">
  <span class="divider__line"></span>
</div>


<!-- Text divider
     A thin line split by a centred label — use to
     separate alternative actions (e.g. "Or sign in
     with email" vs a social login button). -->
<div class="divider divider--text">
  <span class="divider__line"></span>
  <span class="divider__label">Or</span>
  <span class="divider__line"></span>
</div>


<!-- Thick divider
     A heavier 2px line — use to mark a clear structural
     break between distinct page sections or content areas. -->
<div class="divider divider--thick">
  <span class="divider__line"></span>
</div>
