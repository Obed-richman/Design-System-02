<!-- ============================================
     DISPLAY ROW COMPONENT SNIPPETS
     Copy what you need into a screen or index.html
     Requires: tokens/tokens.css
               icons/icons.css + icons/icons.svg
               components/display-row/display-row.css
               components/button/button.css    (button variants)
               components/radio/radio.css      (radio variants)

     Wrap stacked rows in a container that provides
     horizontal padding, e.g.:
       <div style="padding: 0 var(--gap-medium);">...</div>
     ============================================ -->


<!-- ============================================
     BASE — label + chevron only
     ============================================ -->

<div class="display-row">
  <div class="display-row__content">
    <div class="display-row__text">
      <span class="display-row__label">Delivery</span>
    </div>
    <span class="display-row__chevron">
      <svg width="7" height="12"><use href="../../icons/icons.svg#icon-chevron-small-right"></use></svg>
    </span>
  </div>
</div>

    <span class="display-row__chevron">

</div>

<!-- ============================================
     WITH RADIO
     Uses .radio component — no label text on
     the radio itself, the row label serves that role.
     ============================================ -->

<label class="display-row">
  <div class="display-row__content">
    <div class="display-row__text">
      <span class="display-row__label">Delivery</span>
    </div>
    <div class="display-row__action">
      <span class="radio">
        <input class="radio__input" type="radio" name="option" />
        <span class="radio__control"></span>
      </span>
    </div>
    <span class="display-row__chevron">
      <svg width="7" height="12"><use href="../../icons/icons.svg#icon-chevron-small-right"></use></svg>
    </span>
  </div>
</label>
