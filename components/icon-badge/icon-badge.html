<!-- ============================================
     ICON BADGE COMPONENT SNIPPETS
     Copy what you need into a screen or index.html

     Requires: tokens/tokens.css
               icons/icons.css
               components/icon-badge/icon-badge.css

     Usage pattern:
       <div class="icon-badge icon-badge--xxl icon-badge--purple">
         <svg class="icon-badge__icon">
           <use href="../../icons/icons.svg#icon-name"></use>
         </svg>
       </div>
     ============================================ -->


<!-- ============================================================
     COLOUR VARIANTS — XXL size, three background colours
     Purple (.icon-badge--purple) is the default.
     ============================================================ -->

<!-- Purple (default) -->
<div class="icon-badge icon-badge--xxl icon-badge--purple">
  <svg class="icon-badge__icon" viewBox="0 0 96 96" fill="currentColor">
    <use href="../../icons/icons.svg#icon-policy"></use>
  </svg>
</div>

<!-- Navy -->
<div class="icon-badge icon-badge--xxl icon-badge--navy">
