<!-- ============================================================
     KEY STATS SCRIPT
     Copy into screen file — do not include in component HTML file.
     Supports multiple .key-stats instances on the same page —
     each section is observed and scoped independently.
     ============================================================ -->
<script>
  /* Key Stats — count-up animation
     Numbers count up from 0 to target with ease-out quad easing.
     Triggers once when the section reaches 20% viewport visibility.
     Respects prefers-reduced-motion. */
  (function () {

    /* Easing function: ease-out quad — decelerates toward end */
    function easeOut(t) { return t * (2 - t); }

    /* Animate a single number span from 0 to its data-target */
    function animateCounter(el) {
      var target   = parseInt(el.dataset.target, 10);
      var suffix   = el.dataset.suffix || '';
      var duration = parseInt(el.dataset.duration, 10) || 1600;
      var start    = null;

      function step(timestamp) {
        if (!start) start = timestamp;
        var elapsed  = timestamp - start;
        var progress = Math.min(elapsed / duration, 1);
        var eased    = easeOut(progress);
        var current  = Math.round(eased * target);

        el.textContent = current + suffix;

        if (progress < 1) {
          requestAnimationFrame(step);
        } else {
          el.textContent = target + suffix; /* ensure exact final value */
        }
      }

      requestAnimationFrame(step);
    }

    /* Wire up each .key-stats section independently */
    var sections = document.querySelectorAll('.key-stats');

    sections.forEach(function (section) {
      var counters = section.querySelectorAll('.key-stats__number-value');
      var animated = false;

      /* Respect reduced motion — set final values immediately, skip observer */
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        counters.forEach(function (el) {
          el.textContent = el.dataset.target + (el.dataset.suffix || '');
        });
        return;
      }

      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting && !animated) {
            animated = true;
            counters.forEach(animateCounter);
            observer.disconnect(); /* fire once only */
          }
        });
      }, { threshold: 0.2 });

      observer.observe(section);
    });

  }());
</script>
