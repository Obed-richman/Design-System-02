<!-- ============================================
     DISPLAY TILE COMPONENT SNIPPETS
     Copy what you need into a screen or index.html
     Requires: tokens/tokens.css
               icons/icons.css + icons/icons.svg
               components/display-tile/display-tile.css
               components/radio/radio.css      (radio variants)
               components/checkbox/checkbox.css (checkbox variants)
               components/button/button.css    (button variants)

     Tiles are self-contained cards — no stacking
     wrapper needed. Add gap between tiles with
     CSS gap or margin on the parent container.
     ============================================ -->


<!-- ============================================
     BASE — label + chevron only
     ============================================ -->

<div class="display-tile">
  <div class="display-tile__content">
    <div class="display-tile__text">
      <span class="display-tile__label">Subtitle</span>
    </div>
    <span class="display-tile__chevron">
      <svg width="7" height="12"><use href="../../icons/icons.svg#icon-chevron-small-right"></use></svg>
    </span>
  </div>
</div>


<!-- ============================================
     WITH SUPPORT TEXT

<!-- ============================================
     WITH RADIO (right-aligned)
     Wrap in <label> so the full tile is clickable.
     Uses .radio component — no extra radio styling needed.
     ============================================ -->

<label class="display-tile">
  <div class="display-tile__content">
    <div class="display-tile__text">
      <span class="display-tile__label">Subtitle</span>
    </div>
    <div class="display-tile__action">
      <span class="radio">
        <input class="radio__input" type="radio" name="tile-group" />
        <span class="radio__control"></span>
      </span>
    </div>
    <span class="display-tile__chevron">
      <svg width="7" height="12"><use href="../../icons/icons.svg#icon-chevron-small-right"></use></svg>
    </span>
  </div>
</label>
