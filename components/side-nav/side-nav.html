<!-- ============================================================
     COLLAPSED STATE — add .side-nav--collapsed to root element
     Icons only, 44px wide. Toggle JS handles this automatically.
     ============================================================ -->

<!--
<nav class="side-nav side-nav--collapsed" id="side-nav">
  ... same inner HTML as above — JS toggles the modifier class ...
</nav>
-->


<!-- ============================================
     REQUIRED JAVASCRIPT
     Copy this <script> block into your screen file.
     ============================================ -->
<script>
// Side nav — toggle expanded/collapsed, active state, sub-nav
// Copy this script block into your screen file

(function() {
  const nav    = document.querySelector('.side-nav');
  const toggle = nav ? nav.querySelector('.side-nav__toggle') : null;
  const toggleIcon = toggle ? toggle.querySelector('use') : null;

  // Expand / collapse the whole nav
  // Swaps the toggle chevron direction to match the new state
  if (toggle) {
    toggle.addEventListener('click', function() {
      const collapsed = nav.classList.toggle('side-nav--collapsed');
      if (toggleIcon) {
        toggleIcon.setAttribute('href',
          collapsed
            ? '../../icons/icons.svg#icon-chevron-small-right'
            : '../../icons/icons.svg#icon-chevron-small-left'
        );
      }
      toggle.setAttribute('aria-label', collapsed ? 'Expand navigation' : 'Collapse navigation');
    });
  }

  // Nav item clicks — active state + sub-nav toggle
  if (nav) {
    nav.querySelectorAll('.side-nav__item').forEach(function(item) {
      item.addEventListener('click', function() {
        // Active state — move to clicked item
        nav.querySelectorAll('.side-nav__item').forEach(function(i) {
          i.classList.remove('side-nav__item--active');
        });
        item.classList.add('side-nav__item--active');

        // Sub-nav toggle — only if the next sibling is .side-nav__sub-items
        const subItems = item.nextElementSibling;
        if (subItems && subItems.classList.contains('side-nav__sub-items')) {
          const isOpen = subItems.classList.toggle('side-nav__sub-items--open');
          const chevron = item.querySelector('.side-nav__item-chevron');
          if (chevron) chevron.classList.toggle('side-nav__item-chevron--open', isOpen);
        }
      });
    });
  }
})();
</script>
