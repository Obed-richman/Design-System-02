<!-- ============================================================
     VIDEO SECTION SCRIPT
     Copy into screen file — do not include in component HTML file.
     ============================================================ -->
<script>
  /* Video Section — lightbox modal
     Opens a YouTube embed when a play button is clicked.
     Manages focus, scroll lock, and keyboard interactions. */
  (function () {
    var modal       = document.getElementById('video-modal');
    var iframe      = document.getElementById('video-modal-iframe');
    var closeBtn    = modal ? modal.querySelector('.video-modal__close') : null;
    var backdrop    = modal ? modal.querySelector('.video-modal__backdrop') : null;
    var lastFocused = null;

    if (!modal || !iframe) return;

    /* Open modal */
    function openModal(videoId) {
      if (!videoId) {
        console.warn('[video-section] No data-video-id set on this card. Add a YouTube video ID.');
        return;
      }
      lastFocused = document.activeElement;
      iframe.src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=1&rel=0';
      modal.removeAttribute('hidden');
      document.body.style.overflow = 'hidden';
      if (closeBtn) closeBtn.focus();
    }

    /* Close modal */
    function closeModal() {
      modal.setAttribute('hidden', '');
      iframe.src = '';
      document.body.style.overflow = '';
      if (lastFocused) lastFocused.focus();
    }

    /* Wire play buttons */
    document.querySelectorAll('.video-card__play').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var videoId = btn.closest('.video-card').dataset.videoId || '';
        openModal(videoId);
      });
    });

    /* Close triggers */
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop)  backdrop.addEventListener('click', closeModal);

    /* Escape key */
    document.addEventListener('keydown', function (e) {
      if ((e.key === 'Escape' || e.key === 'Esc') && !modal.hasAttribute('hidden')) {
        closeModal();
      }
    });

    /* Focus trap */
    modal.addEventListener('keydown', function (e) {
      if (e.key !== 'Tab') return;
      var focusable = modal.querySelectorAll(
        'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
      );
      var first = focusable[0];
      var last  = focusable[focusable.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last)  { e.preventDefault(); first.focus(); }
      }
    });

  }());
</script>
