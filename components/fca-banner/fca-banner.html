<!-- ============================================================
     VARIANT 1 — Desktop | 1440px wide | Horizontal layout
     ============================================================ -->

<!-- FCA Banner | Desktop | 1440px wide | Horizontal layout -->
<div class="fca-banner fca-banner--desktop" role="region" aria-label="Regulatory information">
  <div class="fca-banner__content">
    <svg class="icon icon--xs fca-banner__icon" viewBox="0 0 96 96" aria-hidden="true" focusable="false">
      <use href="../../icons/icons.svg#icon-lock"></use>
    </svg>
    <p class="fca-banner__text">Authorised and regulated by the FCA</p>
  </div>
</div>
