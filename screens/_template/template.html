    /* ============================================
       [Screen name] — screen-specific styles
       Shared layout patterns are defined here.
       Component styles stay in their own files.
    ============================================ */

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg-primary);
      font-family: var(--font-family-base);
    }

    /* Two-column shell: side nav + main content */
    .screen {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .screen-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* Scrollable content area */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: var(--gap-medium);
      display: flex;
      flex-direction: column;
      gap: var(--gap-medium);
    }

  </style>
