<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Name</title>

  <!-- 1. Tokens — always first -->
  <link rel="stylesheet" href="../tokens/tokens.css" />
  <link rel="stylesheet" href="../tokens/typography.css" />

  <!-- 2. Icons -->
  <link rel="stylesheet" href="../icons/icons.css" />

  <!-- 3. Components — add only what this screen uses -->
  <link rel="stylesheet" href="../components/button/button.css" />
  <link rel="stylesheet" href="../components/input/input.css" />

  <style>
    /* Screen-specific layout styles go here */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* Mobile-first, centred content */
    .screen {
      max-width: var(--frame-container);
      margin: 0 auto;
      padding: var(--gap-x-large) var(--margin-small);
    }
  </style>
</head>
<body>

  <div class="screen">

    <!-- Your prototype content goes here -->
    <!-- Error — bg-negative, 1px negative border, warning icon in field, red message row -->
    <div class="input-group input-group--error">
      <div class="input-label-block">
        <p class="input-label-block__title">Email address</p>
        <p class="input-label-block__support">We'll send your confirmation here.</p>
      </div>
      <div class="input-field">
        <input class="input input--icon-right" id="input-error" type="email" value="notanemail" />
        <span class="input-icon input-icon--error" aria-hidden="true">
          <svg class="icon icon--sm" viewBox="0 0 96 96" fill="currentColor">
            <use href="../../icons/icons.svg#icon-caution"></use>
          </svg>
        </span>
      </div>
      <div class="input-message">
        <svg class="icon icon--md input-message__icon" viewBox="0 0 96 96" fill="currentColor" aria-hidden="true">
          <use href="../../icons/icons.svg#icon-caution"></use>
        </svg>
        <span class="input-message__text">Please enter a valid email address</span>
      </div>
    </div>

  </div>

</body>
</html>
